name: GitHub Release Asset

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to package and attach to the GitHub release
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-asset:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Build Addon Zip
        id: build_zip
        run: |
          chmod +x scripts/build_release_zip.sh
          zip_path="$(scripts/build_release_zip.sh "${RELEASE_TAG}")"
          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"

      - name: Create Or Update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file CHANGELOG.txt
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file CHANGELOG.txt \
              --verify-tag
          fi

      - name: Upload Zip Asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            "${{ steps.build_zip.outputs.zip_path }}" \
            --clobber
